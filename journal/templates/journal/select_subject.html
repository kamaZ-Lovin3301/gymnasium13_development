<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Выбор предмета - Журнал учителя</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .header h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: white;
            text-decoration: none;
            font-size: 16px;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-3px);
        }

        .card a {
            text-decoration: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .subject-name {
            font-size: 18px;
            font-weight: bold;
            color: #764ba2;
        }

        .arrow {
            color: #999;
            font-size: 24px;
        }

        .no-subjects {
            background: white;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="{% url 'teacher_journal' %}" class="back-link">← Назад к классам</a>

        <div class="header">
            <h1>📖 {{ class_obj.grade }}{{ class_obj.letter }} класс</h1>
            <p>Выберите предмет для работы</p>
        </div>

        {% if subjects %}
            {% for subject in subjects %}
            <div class="card">
                <a href="{% url 'journal_page' class_obj.id subject.id %}">
                    <span class="subject-name">{{ subject.name }}</span>
                    <span class="arrow">→</span>
                </a>
            </div>
            {% endfor %}
        {% else %}
            <div class="no-subjects">
                <p>📖 У вас нет предметов в этом классе</p>
                <p>Проверьте расписание</p>
            </div>
        {% endif %}
    </div>
</body>
</html>
